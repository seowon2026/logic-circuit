    <text class="label" x="187" y="810">MUX3</text><text class="small" x="192" y="828">8x1</text>
    <text class="tiny" x="158" y="852">D0</text><text class="tiny" x="158" y="872">D1</text><text class="tiny" x="158" y="892">D2</text><text class="tiny" x="158" y="912">D3</text>
    <text class="tiny" x="158" y="932">D4</text><text class="tiny" x="158" y="952">D5</text><text class="tiny" x="158" y="972">D6</text><text class="tiny" x="158" y="992">D7</text>
    <text class="tiny" x="205" y="965">S0 S1 S2</text><text class="tiny" x="254" y="884">Y</text>
  </g>

  <!-- MUX input wires -->
  <g class="wire">
    <path d="M75 150 H150"/><path d="M75 170 H150"/><path d="M75 190 H150"/><path d="M75 210 H150"/>
    <path d="M75 230 H150"/><path d="M75 250 H150"/><path d="M75 270 H150"/><path d="M75 290 H150"/>
    <path d="M75 370 H150"/><path d="M75 390 H150"/><path d="M75 410 H150"/><path d="M75 430 H150"/>
    <path d="M75 450 H150"/><path d="M75 470 H150"/><path d="M75 490 H150"/><path d="M75 510 H150"/>
    <path d="M75 590 H150"/><path d="M75 610 H150"/><path d="M75 630 H150"/><path d="M75 650 H150"/>
    <path d="M75 670 H150"/><path d="M75 690 H150"/><path d="M75 710 H150"/><path d="M75 730 H150"/>
    <path d="M75 810 H150"/><path d="M75 830 H150"/><path d="M75 850 H150"/><path d="M75 870 H150"/>
    <path d="M75 890 H150"/><path d="M75 910 H150"/><path d="M75 930 H150"/><path d="M75 950 H150"/>
  </g>

  <!-- Source group selector MUX4 -->
  <rect class="chip" x="430" y="450" width="135" height="210"/>
  <text class="label" x="474" y="478">MUX4</text>
  <text class="small" x="455" y="498">8x1, 4x1&#52376;&#47100;</text>
  <text class="tiny" x="438" y="530">D0=MUX0.Y</text>
  <text class="tiny" x="438" y="555">D1=MUX1.Y</text>
  <text class="tiny" x="438" y="580">D2=MUX2.Y</text>
  <text class="tiny" x="438" y="605">D3=MUX3.Y</text>
  <text class="tiny" x="438" y="630">D4~D7=0</text>
  <text class="tiny" x="480" y="650">S0 S1</text>
  <text class="tiny" x="548" y="560">Y</text>

  <path class="wire" d="M275 220 H330 V530 H430"/>
  <path class="wire" d="M275 440 H355 V555 H430"/>
  <path class="wire" d="M275 660 H355 V580 H430"/>
  <path class="wire" d="M275 880 H330 V605 H430"/>
  <circle class="dot" cx="330" cy="530" r="4"/><circle class="dot" cx="355" cy="555" r="4"/>
  <circle class="dot" cx="355" cy="580" r="4"/><circle class="dot" cx="330" cy="605" r="4"/>

  <!-- Trunk -->
  <path class="bus" d="M565 555 H760"/>
  <rect class="note" x="620" y="520" width="90" height="55"/>
  <text class="label" x="642" y="545">&#51473;&#44228;&#49440;</text>
  <text class="tiny" x="633" y="563">TRUNK</text>

  <!-- Destination group DMUX4 -->
  <rect class="chip" x="760" y="450" width="145" height="210"/>
  <text class="label" x="798" y="478">DMUX4</text>
  <text class="small" x="775" y="498">1x8, 1x4&#52376;&#47100;</text>
  <text class="tiny" x="768" y="535">IN=TRUNK</text>
  <text class="tiny" x="852" y="520">Y0</text>
  <text class="tiny" x="852" y="545">Y1</text>
  <text class="tiny" x="852" y="570">Y2</text>
  <text class="tiny" x="852" y="595">Y3</text>
  <text class="tiny" x="810" y="650">S0 S1</text>

  <!-- Final DMUX chips -->
  <g id="dmux0">
    <rect class="chip" x="1060" y="125" width="135" height="190"/>
    <text class="label" x="1095" y="150">DMUX0</text><text class="small" x="1108" y="168">1x8</text>
    <text class="tiny" x="1068" y="224">IN</text><text class="tiny" x="1148" y="192">Y0</text><text class="tiny" x="1148" y="212">Y1</text>
    <text class="tiny" x="1148" y="232">Y2</text><text class="tiny" x="1148" y="252">Y3</text><text class="tiny" x="1148" y="272">Y4</text>
    <text class="tiny" x="1148" y="292">Y5</text><text class="tiny" x="1148" y="312">Y6</text><text class="tiny" x="1148" y="332">Y7</text>
    <text class="tiny" x="1095" y="305">S0 S1 S2</text>
  </g>
  <g id="dmux1">
