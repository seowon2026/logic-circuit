    <text class="tiny" x="1068" y="884">IN</text><text class="tiny" x="1148" y="852">Y0</text><text class="tiny" x="1148" y="872">Y1</text>
    <text class="tiny" x="1148" y="892">Y2</text><text class="tiny" x="1148" y="912">Y3</text><text class="tiny" x="1148" y="932">Y4</text>
    <text class="tiny" x="1148" y="952">Y5</text><text class="tiny" x="1148" y="972">Y6</text><text class="tiny" x="1148" y="992">Y7</text>
    <text class="tiny" x="1095" y="965">S0 S1 S2</text>
  </g>

  <!-- DMUX4 to final DMUX inputs -->
  <path class="wire" d="M905 520 H985 V220 H1060"/>
  <path class="wire" d="M905 545 H1015 V440 H1060"/>
  <path class="wire" d="M905 570 H1015 V660 H1060"/>
  <path class="wire" d="M905 595 H985 V880 H1060"/>
  <circle class="dot" cx="985" cy="520" r="4"/><circle class="dot" cx="1015" cy="545" r="4"/>
  <circle class="dot" cx="1015" cy="570" r="4"/><circle class="dot" cx="985" cy="595" r="4"/>

  <!-- Receiver output labels -->
  <text class="label" x="1510" y="120">&#49688;&#49888; &#44032;&#51077;&#51088; &#52636;&#47141;</text>
  <g class="small">
    <text x="1530" y="155">S00</text><text x="1530" y="175">S01</text><text x="1530" y="195">S02</text><text x="1530" y="215">S03</text>
    <text x="1530" y="235">S04</text><text x="1530" y="255">S05</text><text x="1530" y="275">S06</text><text x="1530" y="295">S07</text>
    <text x="1530" y="375">S08</text><text x="1530" y="395">S09</text><text x="1530" y="415">S10</text><text x="1530" y="435">S11</text>
    <text x="1530" y="455">S12</text><text x="1530" y="475">S13</text><text x="1530" y="495">S14</text><text x="1530" y="515">S15</text>
    <text x="1530" y="595">S16</text><text x="1530" y="615">S17</text><text x="1530" y="635">S18</text><text x="1530" y="655">S19</text>
    <text x="1530" y="675">S20</text><text x="1530" y="695">S21</text><text x="1530" y="715">S22</text><text x="1530" y="735">S23</text>
    <text x="1530" y="815">S24</text><text x="1530" y="835">S25</text><text x="1530" y="855">S26</text><text x="1530" y="875">S27</text>
    <text x="1530" y="895">S28</text><text x="1530" y="915">S29</text><text x="1530" y="935">S30</text><text x="1530" y="955">S31</text>
  </g>

  <!-- Final DMUX output wires -->
  <g class="wire">
    <path d="M1195 150 H1525"/><path d="M1195 170 H1525"/><path d="M1195 190 H1525"/><path d="M1195 210 H1525"/>
    <path d="M1195 230 H1525"/><path d="M1195 250 H1525"/><path d="M1195 270 H1525"/><path d="M1195 290 H1525"/>
    <path d="M1195 370 H1525"/><path d="M1195 390 H1525"/><path d="M1195 410 H1525"/><path d="M1195 430 H1525"/>
    <path d="M1195 450 H1525"/><path d="M1195 470 H1525"/><path d="M1195 490 H1525"/><path d="M1195 510 H1525"/>
    <path d="M1195 590 H1525"/><path d="M1195 610 H1525"/><path d="M1195 630 H1525"/><path d="M1195 650 H1525"/>
    <path d="M1195 670 H1525"/><path d="M1195 690 H1525"/><path d="M1195 710 H1525"/><path d="M1195 730 H1525"/>
    <path d="M1195 810 H1525"/><path d="M1195 830 H1525"/><path d="M1195 850 H1525"/><path d="M1195 870 H1525"/>
    <path d="M1195 890 H1525"/><path d="M1195 910 H1525"/><path d="M1195 930 H1525"/><path d="M1195 950 H1525"/>
  </g>

  <!-- Select/control lines -->
  <path class="ctrl" d="M160 1040 H275"/>
  <path class="ctrl" d="M275 1040 V315"/>
  <path class="ctrl" d="M275 1040 V535"/>
  <path class="ctrl" d="M275 1040 V755"/>
  <path class="ctrl" d="M275 1040 V975"/>
  <text class="small blue" x="45" y="1044">SRC[2:0] - MUX0~MUX3 &#44277;&#53685; &#49440;&#53469;&#49440;</text>

  <path class="ctrl" d="M430 1080 H565 V660"/>
  <text class="small blue" x="430" y="1102">SRC[4:3] - MUX4&#51032; &#49569;&#49888; &#44536;&#47353; &#49440;&#53469;&#49440;</text>

  <path class="ctrl" d="M760 1080 H905 V660"/>
  <text class="small blue" x="760" y="1102">DST[4:3] - DMUX4&#51032; &#49688;&#49888; &#44536;&#47353; &#49440;&#53469;&#49440;</text>

  <path class="ctrl" d="M1060 1040 H1195"/>
  <path class="ctrl" d="M1195 1040 V315"/>
  <path class="ctrl" d="M1195 1040 V535"/>
  <path class="ctrl" d="M1195 1040 V755"/>
  <path class="ctrl" d="M1195 1040 V975"/>
  <text class="small blue" x="1060" y="1044">DST[2:0] - DMUX0~DMUX3 &#44277;&#53685; &#49440;&#53469;&#49440;</text>

  <!-- Notes -->
  <rect class="note" x="45" y="1140" width="760" height="70"/>
  <text class="label" x="60" y="1167">LogicWorks&#50640;&#49436; &#44536;&#47540; &#46412; &#54645;&#49900;</text>
  <text class="small" x="60" y="1190">MUX4&#45716; 8x1&#51060;&#51648;&#47564; D0~D3&#47564; &#49324;&#50857;&#54616;&#44256; D4~D7&#51008; 0&#51004;&#47196; &#52376;&#47532;&#54620;&#45796;.</text>
  <text class="small" x="60" y="1208">DMUX4&#45716; 1x8&#51060;&#51648;&#47564; Y0~Y3&#47564; DMUX0~DMUX3&#47196; &#48372;&#45236;&#44256; Y4~Y7&#51008; &#49324;&#50857;&#54616;&#51648; &#50506;&#45716;&#45796;.</text>

  <rect class="note" x="840" y="1140" width="780" height="70"/>
  <text class="label" x="855" y="1167">&#49440;&#53469;&#49440; &#51221;&#47532;</text>
  <text class="small" x="855" y="1190">SRC[4:0] = &#49569;&#49888;&#51088; &#48264;&#54840;, DST[4:0] = &#49688;&#49888;&#51088; &#48264;&#54840;</text>
  <text class="small" x="855" y="1208">[4:3]&#51008; 4&#44060; &#44536;&#47353; &#51473; &#54616;&#45208;, [2:0]&#51008; &#44536;&#47353; &#50504;&#51032; 8&#47749; &#51473; &#54616;&#45208;&#47484; &#49440;&#53469;</text>
</svg>
