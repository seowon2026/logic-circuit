    <text class="label" x="1095" y="370">DMUX1</text><text class="small" x="1108" y="388">1x8</text>
    <text class="tiny" x="1068" y="444">IN</text><text class="tiny" x="1148" y="412">Y0</text><text class="tiny" x="1148" y="432">Y1</text>
    <text class="tiny" x="1148" y="452">Y2</text><text class="tiny" x="1148" y="472">Y3</text><text class="tiny" x="1148" y="492">Y4</text>
    <text class="tiny" x="1148" y="512">Y5</text><text class="tiny" x="1148" y="532">Y6</text><text class="tiny" x="1148" y="552">Y7</text>
    <text class="tiny" x="1095" y="525">S0 S1 S2</text>
  </g>
  <g id="dmux2">
