<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1250" viewBox="0 0 1700 1250">
  <defs>
    <pattern id="smallGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e6e6e6" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" fill="url(#smallGrid)"/>
      <path d="M 160 0 L 0 0 0 160" fill="none" stroke="#c8c8c8" stroke-width="1.6"/>
    </pattern>
    <style>
      .bg { fill: #fbfbfb; }
      .wire { stroke: #ff1717; stroke-width: 2.2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .bus { stroke: #ff1717; stroke-width: 3.5; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .ctrl { stroke: #1d4ed8; stroke-width: 2; fill: none; stroke-dasharray: 7 5; }
      .chip { fill: #fff; stroke: #111; stroke-width: 2.1; }
      .pin { stroke: #111; stroke-width: 1.8; }
      .dot { fill: #ff1717; }
      .blueDot { fill: #1d4ed8; }
      .title { font: 700 28px Arial, 'Malgun Gothic', sans-serif; fill: #111; }
      .label { font: 15px Arial, 'Malgun Gothic', sans-serif; fill: #111; }
      .small { font: 12px Arial, 'Malgun Gothic', sans-serif; fill: #222; }
      .tiny { font: 10.5px Arial, 'Malgun Gothic', sans-serif; fill: #333; }
      .blue { fill: #1d4ed8; }
      .note { fill: #fffdeb; stroke: #777; stroke-width: 1.3; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1250"/>
  <rect width="1700" height="1250" fill="url(#grid)"/>

  <text class="title" x="45" y="45">&#51;&#50;&#44032;&#51077;&#51088; &#51204;&#54868; &#51473;&#44228;&#44592; - LogicWorks &#48373;&#49324;&#50857; &#54924;&#47196;&#46020;</text>
  <text class="label" x="45" y="72">&#44592;&#48376; &#49548;&#51088;: 8x1 MUX 5&#44060;, 1x8 DMUX 5&#44060; / &#48744;&#44036;&#49440; = &#53685;&#54868; &#49888;&#54840;, &#54028;&#46976;&#49440; = &#49440;&#53469;&#49440;</text>

  <!-- Source labels -->
  <text class="label" x="45" y="120">&#49569;&#49888; &#44032;&#51077;&#51088; &#51077;&#47141;</text>
  <g class="small">
    <text x="45" y="155">S00</text><text x="45" y="175">S01</text><text x="45" y="195">S02</text><text x="45" y="215">S03</text>
    <text x="45" y="235">S04</text><text x="45" y="255">S05</text><text x="45" y="275">S06</text><text x="45" y="295">S07</text>
    <text x="45" y="375">S08</text><text x="45" y="395">S09</text><text x="45" y="415">S10</text><text x="45" y="435">S11</text>
    <text x="45" y="455">S12</text><text x="45" y="475">S13</text><text x="45" y="495">S14</text><text x="45" y="515">S15</text>
    <text x="45" y="595">S16</text><text x="45" y="615">S17</text><text x="45" y="635">S18</text><text x="45" y="655">S19</text>
    <text x="45" y="675">S20</text><text x="45" y="695">S21</text><text x="45" y="715">S22</text><text x="45" y="735">S23</text>
    <text x="45" y="815">S24</text><text x="45" y="835">S25</text><text x="45" y="855">S26</text><text x="45" y="875">S27</text>
    <text x="45" y="895">S28</text><text x="45" y="915">S29</text><text x="45" y="935">S30</text><text x="45" y="955">S31</text>
  </g>

  <!-- First-stage MUX chips -->
  <g id="mux0">
    <rect class="chip" x="150" y="125" width="125" height="190"/>
    <text class="label" x="187" y="150">MUX0</text><text class="small" x="192" y="168">8x1</text>
    <text class="tiny" x="158" y="192">D0</text><text class="tiny" x="158" y="212">D1</text><text class="tiny" x="158" y="232">D2</text><text class="tiny" x="158" y="252">D3</text>
    <text class="tiny" x="158" y="272">D4</text><text class="tiny" x="158" y="292">D5</text><text class="tiny" x="158" y="312">D6</text><text class="tiny" x="158" y="332">D7</text>
    <text class="tiny" x="205" y="305">S0 S1 S2</text><text class="tiny" x="254" y="224">Y</text>
  </g>
  <g id="mux1">
    <rect class="chip" x="150" y="345" width="125" height="190"/>
    <text class="label" x="187" y="370">MUX1</text><text class="small" x="192" y="388">8x1</text>
    <text class="tiny" x="158" y="412">D0</text><text class="tiny" x="158" y="432">D1</text><text class="tiny" x="158" y="452">D2</text><text class="tiny" x="158" y="472">D3</text>
    <text class="tiny" x="158" y="492">D4</text><text class="tiny" x="158" y="512">D5</text><text class="tiny" x="158" y="532">D6</text><text class="tiny" x="158" y="552">D7</text>
    <text class="tiny" x="205" y="525">S0 S1 S2</text><text class="tiny" x="254" y="444">Y</text>
  </g>
  <g id="mux2">
    <rect class="chip" x="150" y="565" width="125" height="190"/>
    <text class="label" x="187" y="590">MUX2</text><text class="small" x="192" y="608">8x1</text>
    <text class="tiny" x="158" y="632">D0</text><text class="tiny" x="158" y="652">D1</text><text class="tiny" x="158" y="672">D2</text><text class="tiny" x="158" y="692">D3</text>
    <text class="tiny" x="158" y="712">D4</text><text class="tiny" x="158" y="732">D5</text><text class="tiny" x="158" y="752">D6</text><text class="tiny" x="158" y="772">D7</text>
    <text class="tiny" x="205" y="745">S0 S1 S2</text><text class="tiny" x="254" y="664">Y</text>
  </g>
  <g id="mux3">
