    <text class="label" x="1095" y="590">DMUX2</text><text class="small" x="1108" y="608">1x8</text>
    <text class="tiny" x="1068" y="664">IN</text><text class="tiny" x="1148" y="632">Y0</text><text class="tiny" x="1148" y="652">Y1</text>
    <text class="tiny" x="1148" y="672">Y2</text><text class="tiny" x="1148" y="692">Y3</text><text class="tiny" x="1148" y="712">Y4</text>
    <text class="tiny" x="1148" y="732">Y5</text><text class="tiny" x="1148" y="752">Y6</text><text class="tiny" x="1148" y="772">Y7</text>
    <text class="tiny" x="1095" y="745">S0 S1 S2</text>
  </g>
  <g id="dmux3">
