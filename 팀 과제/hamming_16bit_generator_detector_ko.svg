<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <pattern id="smallGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e6e6e6" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" fill="url(#smallGrid)"/>
      <path d="M 160 0 L 0 0 0 160" fill="none" stroke="#c8c8c8" stroke-width="1.6"/>
    </pattern>
    <style>
      .bg { fill: #fbfbfb; }
      .wire { stroke: #ff1717; stroke-width: 2.2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .bus { stroke: #ff1717; stroke-width: 4; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .ctrl { stroke: #1d4ed8; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; }
      .chip { fill: #fff; stroke: #111; stroke-width: 2.2; }
      .sub { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; }
      .note { fill: #fffdeb; stroke: #777; stroke-width: 1.3; }
      .xor { fill: #fff; stroke: #111; stroke-width: 2.1; }
      .dot { fill: #ff1717; }
      .bdot { fill: #1d4ed8; }
      .title { font: 700 28px Arial, 'Malgun Gothic', sans-serif; fill: #111; }
      .label { font: 16px Arial, 'Malgun Gothic', sans-serif; fill: #111; }
      .small { font: 13px Arial, 'Malgun Gothic', sans-serif; fill: #222; }
      .tiny { font: 10.5px Arial, 'Malgun Gothic', sans-serif; fill: #333; }
      .blue { fill: #1d4ed8; }
      .red { fill: #dc2626; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1250"/>
  <rect width="1800" height="1250" fill="url(#grid)"/>

  <text class="title" x="45" y="48">16&#48708;&#53944; &#45936;&#51060;&#53552; &#51204;&#49569;&#50857; &#54644;&#48141;&#53076;&#46300; &#48156;&#49373;&#44592; + &#44160;&#52636;/&#51221;&#51221;&#54924;&#47196;</text>
  <text class="label" x="45" y="78">Hamming(21,16): &#45936;&#51060;&#53552; 16&#48708;&#53944; + &#54056;&#47532;&#54000; 5&#48708;&#53944; / &#45800;&#51068; &#48708;&#53944; &#50724;&#47448; &#44160;&#52636; &#48143; &#51221;&#51221;</text>

  <!-- Data input -->
  <text class="label" x="55" y="135">16-bit DATA INPUT</text>
  <rect class="chip" x="55" y="155" width="140" height="390"/>
  <g class="small">
    <text x="75" y="185">D0</text><text x="75" y="207">D1</text><text x="75" y="229">D2</text><text x="75" y="251">D3</text>
    <text x="75" y="273">D4</text><text x="75" y="295">D5</text><text x="75" y="317">D6</text><text x="75" y="339">D7</text>
    <text x="75" y="361">D8</text><text x="75" y="383">D9</text><text x="75" y="405">D10</text><text x="75" y="427">D11</text>
    <text x="75" y="449">D12</text><text x="75" y="471">D13</text><text x="75" y="493">D14</text><text x="75" y="515">D15</text>
  </g>

  <!-- Generator -->
  <rect class="chip" x="270" y="130" width="380" height="450"/>
  <text class="label" x="380" y="160">Hamming Code Generator</text>
  <text class="small" x="295" y="190">&#54056;&#47532;&#54000; &#48708;&#53944; &#50948;&#52824;: C1, C2, C4, C8, C16</text>
  <text class="small" x="295" y="215">&#45936;&#51060;&#53552; &#50948;&#52824;: C3,C5,C6,C7,C9~C15,C17~C21</text>

  <rect class="sub" x="300" y="250" width="310" height="48"/>
  <text class="small" x="315" y="278">P1 = XOR(C1 &#44160;&#49324;&#44536;&#47353;) -> C1</text>
  <rect class="sub" x="300" y="310" width="310" height="48"/>
  <text class="small" x="315" y="338">P2 = XOR(C2 &#44160;&#49324;&#44536;&#47353;) -> C2</text>
  <rect class="sub" x="300" y="370" width="310" height="48"/>
  <text class="small" x="315" y="398">P4 = XOR(C4 &#44160;&#49324;&#44536;&#47353;) -> C4</text>
  <rect class="sub" x="300" y="430" width="310" height="48"/>
  <text class="small" x="315" y="458">P8 = XOR(C8 &#44160;&#49324;&#44536;&#47353;) -> C8</text>
  <rect class="sub" x="300" y="490" width="310" height="48"/>
  <text class="small" x="315" y="518">P16 = XOR(C16 &#44160;&#49324;&#44536;&#47353;) -> C16</text>

  <!-- Input bus to generator -->
  <path class="bus" d="M195 350 H270"/>
  <text class="small red" x="205" y="335">D[15:0]</text>

  <!-- Codeword map -->
  <rect class="chip" x="720" y="120" width="310" height="470"/>
  <text class="label" x="805" y="150">21-bit Codeword</text>
  <text class="small" x="750" y="180">C1 C2 C3 ... C21</text>
  <g class="tiny">
    <text x="745" y="215">C1=P1</text><text x="845" y="215">C2=P2</text><text x="945" y="215">C3=D0</text>
    <text x="745" y="240">C4=P4</text><text x="845" y="240">C5=D1</text><text x="945" y="240">C6=D2</text>
    <text x="745" y="265">C7=D3</text><text x="845" y="265">C8=P8</text><text x="945" y="265">C9=D4</text>
    <text x="745" y="290">C10=D5</text><text x="845" y="290">C11=D6</text><text x="945" y="290">C12=D7</text>
    <text x="745" y="315">C13=D8</text><text x="845" y="315">C14=D9</text><text x="945" y="315">C15=D10</text>
    <text x="745" y="340">C16=P16</text><text x="845" y="340">C17=D11</text><text x="945" y="340">C18=D12</text>
    <text x="745" y="365">C19=D13</text><text x="845" y="365">C20=D14</text><text x="945" y="365">C21=D15</text>
  </g>
  <rect class="note" x="745" y="410" width="250" height="130"/>
  <text class="small" x="760" y="438">&#51204;&#49569; &#48708;&#53944; &#49692;&#49436;</text>
  <text class="tiny" x="760" y="462">C1,C2,C3,C4,C5,C6,C7,</text>
  <text class="tiny" x="760" y="482">C8,C9,C10,C11,C12,C13,C14,</text>
  <text class="tiny" x="760" y="502">C15,C16,C17,C18,C19,C20,C21</text>
  <text class="tiny" x="760" y="525">P&#50948;&#52824; = 1,2,4,8,16</text>

  <path class="bus" d="M650 350 H720"/>
  <text class="small red" x="658" y="335">C[21:1]</text>

  <!-- Channel -->
  <rect class="note" x="1090" y="250" width="150" height="170"/>
  <text class="label" x="1128" y="285">&#51204;&#49569;&#47196;</text>
  <text class="small" x="1110" y="320">21-bit code</text>
  <text class="small" x="1110" y="345">&#50724;&#47448; &#48156;&#49373;</text>
  <text class="tiny" x="1110" y="370">0 or 1 bit error</text>
  <path class="bus" d="M1030 350 H1090"/>
  <path class="bus" d="M1240 350 H1300"/>

  <!-- Detector -->
  <rect class="chip" x="1300" y="120" width="420" height="470"/>
  <text class="label" x="1425" y="150">Detector / Syndrome</text>
  <text class="small" x="1325" y="185">&#49688;&#49888;&#46108; &#53076;&#46300; R1~R21&#51012; &#54056;&#47532;&#54000; &#44536;&#47353;&#48324;&#47196; XOR</text>
  <rect class="sub" x="1330" y="220" width="150" height="48"/>
  <text class="small" x="1350" y="250">S1 XOR group</text>
  <rect class="sub" x="1330" y="280" width="150" height="48"/>
  <text class="small" x="1350" y="310">S2 XOR group</text>
  <rect class="sub" x="1330" y="340" width="150" height="48"/>
  <text class="small" x="1350" y="370">S4 XOR group</text>
  <rect class="sub" x="1330" y="400" width="150" height="48"/>
  <text class="small" x="1350" y="430">S8 XOR group</text>
  <rect class="sub" x="1330" y="460" width="150" height="48"/>
  <text class="small" x="1345" y="490">S16 XOR group</text>

  <rect class="sub" x="1530" y="250" width="150" height="130"/>
  <text class="label" x="1557" y="282">Syndrome</text>
  <text class="small" x="1564" y="310">S[4:0]</text>
  <text class="tiny" x="1548" y="338">00000 = no error</text>
  <text class="tiny" x="1548" y="360">00001~10101</text>
  <text class="tiny" x="1548" y="378">= error position</text>

  <path class="wire" d="M1480 244 H1530"/>
  <path class="wire" d="M1480 304 H1530"/>
  <path class="wire" d="M1480 364 H1530"/>
  <path class="wire" d="M1480 424 H1530"/>
  <path class="wire" d="M1480 484 H1530"/>

  <!-- Correction circuit -->
  <rect class="chip" x="755" y="690" width="660" height="350"/>
  <text class="label" x="975" y="722">Correction Circuit</text>
  <text class="small" x="790" y="752">S[4:0] -> 5-to-21 Decoder -> E1~E21</text>
  <rect class="sub" x="800" y="790" width="170" height="130"/>
  <text class="label" x="828" y="830">5-to-21</text>
  <text class="label" x="828" y="856">Decoder</text>
  <text class="tiny" x="825" y="888">S=position</text>
  <text class="tiny" x="825" y="908">one-hot E1~E21</text>

  <rect class="sub" x="1040" y="760" width="320" height="230"/>
  <text class="label" x="1105" y="790">21 XOR correction bank</text>
  <text class="small" x="1065" y="830">C1'  = R1  XOR E1</text>
  <text class="small" x="1065" y="855">C2'  = R2  XOR E2</text>
  <text class="small" x="1065" y="880">...</text>
  <text class="small" x="1065" y="905">C21' = R21 XOR E21</text>
  <text class="tiny" x="1065" y="945">E&#44032; 1&#51064; &#48708;&#53944;&#47564; &#48152;&#51204;&#46104;&#50612; &#51221;&#51221;&#46120;</text>

  <path class="ctrl" d="M1605 380 V650 H885 V790"/>
  <text class="small blue" x="1120" y="672">S[4:0] syndrome bus</text>
  <path class="ctrl" d="M970 855 H1040"/>
  <text class="small blue" x="980" y="842">E[21:1]</text>
  <path class="bus" d="M1165 420 V690"/>
  <text class="small red" x="1175" y="610">R[21:1]</text>

  <!-- Corrected data output -->
  <rect class="chip" x="1485" y="705" width="245" height="320"/>
  <text class="label" x="1528" y="735">Corrected DATA OUT</text>
  <text class="small" x="1510" y="765">&#54056;&#47532;&#54000; &#48708;&#53944; &#51228;&#44144;</text>
  <g class="tiny">
    <text x="1510" y="800">OUT0=C3'</text><text x="1605" y="800">OUT1=C5'</text>
    <text x="1510" y="825">OUT2=C6'</text><text x="1605" y="825">OUT3=C7'</text>
    <text x="1510" y="850">OUT4=C9'</text><text x="1605" y="850">OUT5=C10'</text>
    <text x="1510" y="875">OUT6=C11'</text><text x="1605" y="875">OUT7=C12'</text>
    <text x="1510" y="900">OUT8=C13'</text><text x="1605" y="900">OUT9=C14'</text>
    <text x="1510" y="925">OUT10=C15'</text><text x="1605" y="925">OUT11=C17'</text>
    <text x="1510" y="950">OUT12=C18'</text><text x="1605" y="950">OUT13=C19'</text>
    <text x="1510" y="975">OUT14=C20'</text><text x="1605" y="975">OUT15=C21'</text>
  </g>
  <path class="bus" d="M1360 875 H1485"/>
  <text class="small red" x="1370" y="858">corrected C'</text>

  <!-- Parity groups table -->
  <rect class="note" x="45" y="650" width="650" height="365"/>
  <text class="label" x="65" y="682">&#54056;&#47532;&#54000; &#44160;&#49324; &#44536;&#47353;(&#51677;&#49688; parity &#44592;&#51456;)</text>
  <text class="small" x="65" y="715">P1/S1: C1,C3,C5,C7,C9,C11,C13,C15,C17,C19,C21</text>
  <text class="small" x="65" y="745">P2/S2: C2,C3,C6,C7,C10,C11,C14,C15,C18,C19</text>
  <text class="small" x="65" y="775">P4/S4: C4,C5,C6,C7,C12,C13,C14,C15,C20,C21</text>
  <text class="small" x="65" y="805">P8/S8: C8,C9,C10,C11,C12,C13,C14,C15</text>
  <text class="small" x="65" y="835">P16/S16: C16,C17,C18,C19,C20,C21</text>
  <text class="small" x="65" y="885">&#44160;&#52636;&#44592;&#50640;&#49436; S16 S8 S4 S2 S1&#51012; 2&#51652;&#49688;&#47196; &#51069;&#51004;&#47732; &#50724;&#47448; &#50948;&#52824;&#44032; &#46108;&#45796;.</text>
  <text class="small" x="65" y="915">&#50696;: S=01010(10)&#51060;&#47732; R10&#51060; &#50724;&#47448; -> XOR &#51221;&#51221;&#54924;&#47196;&#50640;&#49436; 10&#48264; &#48708;&#53944;&#47564; &#48152;&#51204;</text>
  <text class="small" x="65" y="965">LogicWorks&#50640;&#49436;&#45716; &#44033; &#44536;&#47353;&#51012; XOR &#44172;&#51060;&#53944; &#53944;&#47532;&#47196; &#44396;&#49457;&#54616;&#47732; &#46108;&#45796;.</text>

  <!-- Flow arrows -->
  <path class="wire" d="M195 350 H235"/>
  <path class="wire" d="M650 350 H690"/>
  <path class="wire" d="M1030 350 H1070"/>
  <path class="wire" d="M1240 350 H1280"/>
</svg>
